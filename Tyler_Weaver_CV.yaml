design:
  theme: engineeringresumes
  page:
    size: us-letter
    top_margin: "0.55in"
    bottom_margin: "0.55in"
    left_margin: "0.65in"
    right_margin: "0.65in"
    show_footer: false
    show_top_note: false
  colors:
    body: "rgb(33, 33, 33)"
    name: "rgb(33, 33, 33)"
    headline: "rgb(33, 33, 33)"
    connections: "rgb(117, 117, 117)"
    section_titles: "rgb(33, 33, 33)"
    links: "rgb(66, 66, 66)"
    footer: "rgb(117, 117, 117)"
    top_note: "rgb(117, 117, 117)"
  typography:
    alignment: justified-with-no-hyphenation
    font_family: "Lato"
    font_size:
      body: "10pt"
      name: "28pt"
      headline: "10pt"
      connections: "9pt"
      section_titles: "1.15em"
    bold:
      name: true
      headline: false
      connections: false
      section_titles: true
    small_caps:
      section_titles: true
  header:
    alignment: left
    space_below_name: "0.3cm"
    space_below_connections: "0.5cm"
    connections:
      separator: "|"
      show_icons: false
      space_between_connections: "0.4cm"
      phone_number_format: national
  links:
    underline: false
    show_external_link_icon: false
  section_titles:
    type: with_full_line
    line_thickness: "0.4pt"
    space_above: "0.5cm"
    space_below: "0.2cm"
  sections:
    space_between_regular_entries: "0.35cm"
    space_between_text_based_entries: "0.15cm"
    show_time_spans_in: []
  entries:
    short_second_row: false
    side_space: "0cm"
    space_between_columns: "0.15cm"
    summary:
      space_above: "0.08cm"
    highlights:
      bullet: "•"
      space_left: "0cm"
      space_above: "0.06cm"
      space_between_items: "0.06cm"
      space_between_bullet_and_text: "0.4em"
  templates:
    experience_entry:
      main_column: "**POSITION**, COMPANY\nSUMMARY\nHIGHLIGHTS"
      date_and_location_column: DATE
    education_entry:
      main_column: "**INSTITUTION**, DEGREE_WITH_AREA\nSUMMARY\nHIGHLIGHTS"
      date_and_location_column: DATE
      degree_column: null
