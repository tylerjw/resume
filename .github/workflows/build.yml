name: build
on: [push]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install rendercv
        run: pip install "rendercv[full]"
      - name: Render CV
        run: rendercv render Tyler_Weaver_CV.yaml --pdf-path cv.pdf
      - name: Install Typst
        run: pip install typst
      - name: Render Cover Letter
        run: python -c "import typst; typst.compile('cover_letter.typ', output='cover_letter.pdf')"
      - name: Upload cv as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cv.pdf
          path: cv.pdf
      - name: Upload cover letter as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cover_letter.pdf
          path: cover_letter.pdf
  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: github_artifacts
      - name: move
        run: mkdir -p github_deploy && mv github_artifacts/*/* github_deploy
      - name: deploy on orphan branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./github_deploy
          publish_branch: build
          force_orphan: true
          enable_jekyll: true
